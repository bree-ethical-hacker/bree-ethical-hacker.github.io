<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <title>Certificates | Black Widow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="./icon.png">
  <style>
    /* Certificates page specific responsive styles */
    .certs-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .certificates-heading {
      text-align: center;
      padding: clamp(6rem, 15vw, 10rem) 1.5rem 1rem;
      position: relative;
      z-index: 1;
    }
    .certificates-heading h2 {
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      font-weight: 800;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.15rem;
      font-family: 'Cinzel', serif;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: clamp(0.8rem, 3vw, 1.5rem);
      flex-wrap: wrap;
      margin: 1rem auto 2rem;
      padding: 0 1rem;
      position: relative;
      z-index: 10;
    }
    .control-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: clamp(0.6rem, 2vw, 1rem) clamp(1.5rem, 4vw, 2.8rem);
      background: transparent;
      border: 2px solid var(--red);
      border-radius: 4rem;
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: var(--red);
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      min-height: 44px;
    }
    .control-btn i { font-size: clamp(1rem, 3vw, 1.4rem); }
    .control-btn:hover {
      background: var(--red);
      color: var(--black);
      transform: scale(1.02);
    }
    .cert-container {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 400px;
      overflow: hidden;
      margin: 1rem 0 3rem;
      position: relative;
      z-index: 1;
    }
    .card-stream {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }
    .card-stream::-webkit-scrollbar {
      height: 5px;
    }
    .card-stream::-webkit-scrollbar-track {
      background: var(--black-3);
      border-radius: 10px;
    }
    .card-stream::-webkit-scrollbar-thumb {
      background: var(--red);
      border-radius: 10px;
    }
    .card-line {
      display: flex;
      align-items: center;
      gap: clamp(1.5rem, 4vw, 4rem);
      padding: 2rem;
      will-change: transform;
    }
    .card-wrapper {
      position: relative;
      width: clamp(200px, 30vw, 350px);
      height: auto;
      aspect-ratio: 16 / 10;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .card-wrapper:hover { transform: scale(1.02); }
    .card {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      overflow: hidden;
    }
    .card-normal {
      background: transparent;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
      z-index: 2;
    }
    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
      transition: all 0.3s ease;
    }
    .card-ascii {
      background: rgba(0,0,0,0.7);
      z-index: 1;
      backdrop-filter: blur(2px);
    }
    .ascii-content {
      width: 100%;
      height: 100%;
      color: rgba(220, 210, 255, 0.5);
      font-family: 'Courier New', monospace;
      font-size: clamp(6px, 1.5vw, 10px);
      line-height: 1.2;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-all;
      padding: 8px;
    }
    .scanner {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: clamp(150px, 40vh, 300px);
      background: linear-gradient(to bottom, transparent, rgba(192,57,43,0.8), var(--red), rgba(192,57,43,0.8), transparent);
      box-shadow: 0 0 20px var(--red);
      animation: scanPulse 2s ease-in-out infinite alternate;
      z-index: 100;
      pointer-events: none;
    }
    @keyframes scanPulse {
      0% { opacity: 0.6; transform: translate(-50%, -50%) scaleY(1); }
      100% { opacity: 1; transform: translate(-50%, -50%) scaleY(1.1); }
    }
    @media (max-width: 768px) {
      .card-line { gap: 1.5rem; padding: 1rem; }
      .scanner { height: 200px; width: 3px; }
    }
    @media (max-width: 480px) {
      .card-line { gap: 1rem; padding: 0.8rem; }
      .scanner { height: 150px; width: 2px; }
    }
  </style>
</head>
<body>

  <svg class="web-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(245,240,235,0.25)" fill="none" stroke-linecap="round">
      <line x1="400" y1="400" x2="400" y2="0" stroke-width="0.7"/>
      <line x1="400" y1="400" x2="594" y2="14" stroke-width="0.6"/>
      <line x1="400" y1="400" x2="748" y2="110" stroke-width="0.7"/>
      <line x1="400" y1="400" x2="800" y2="280" stroke-width="0.6"/>
      <line x1="400" y1="400" x2="800" y2="400" stroke-width="0.7"/>
      <line x1="400" y1="400" x2="800" y2="520" stroke-width="0.6"/>
      <line x1="400" y1="400" x2="748" y2="690" stroke-width="0.7"/>
      <line x1="400" y1="400" x2="594" y2="786" stroke-width="0.6"/>
    </g>
  </svg>

  <header>
    <nav class="navbar glass">
      <a href="community.html" class="btn-nav logo-btn">Black Widow Community</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="hamburger" id="hamburger"><i class="fa fa-bars"></i></div>
    </nav>
    <div class="sidebar" id="sidebar">
      <ul><li><a href="index.html">Home</a></li><li><a href="projects.html">Projects</a></li><li><a href="contact.html">Contact</a></li></ul>
    </div>
    <div class="overlay" id="overlay"></div>
  </header>

  <div class="certs-wrapper">
    <div class="certificates-heading">
      <h2>CERTIFICATES</h2>
    </div>

    <div class="controls">
      <button class="control-btn" id="pauseBtn"><i class="fa-solid fa-pause"></i> <span>Pause</span></button>
      <button class="control-btn" id="homeBtn"><i class="fa-solid fa-house"></i> <span>Home</span></button>
      <button class="control-btn" id="directionBtn"><i class="fa-solid fa-arrows-left-right"></i> <span>Direction</span></button>
    </div>

    <div class="cert-container">
      <canvas id="particleCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></canvas>
      <div class="scanner" id="scanner"></div>
      <div class="card-stream" id="cardStream">
        <div class="card-line" id="cardLine"></div>
      </div>
    </div>
  </div>

  <footer class="footer glass-footer">
    <p>Based in <span>Melbourne, Australia</span></p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ========================================
    // UNIVERSAL NAVIGATION - WORKS ON ALL PAGES
    // ========================================
    
    (function() {
      // Get elements
      const hamburger = document.getElementById('hamburger');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      
      // Sound effects (optional - remove if you don't have the audio files)
      const menuSound = new Audio('menu.mp3');
      const navSound = new Audio('nav.mp3');
      
      // Function to open sidebar
      function openSidebar() {
        if (sidebar) {
          sidebar.classList.add('active');
          document.body.classList.add('sidebar-open');
        }
        if (overlay) overlay.classList.add('active');
      }
      
      // Function to close sidebar
      function closeSidebar() {
        if (sidebar) {
          sidebar.classList.remove('active');
          document.body.classList.remove('sidebar-open');
        }
        if (overlay) overlay.classList.remove('active');
      }
      
      // Toggle sidebar on hamburger click
      if (hamburger) {
        hamburger.addEventListener('click', (e) => {
          e.stopPropagation();
          if (sidebar && sidebar.classList.contains('active')) {
            closeSidebar();
          } else {
            openSidebar();
          }
          // Play sound (optional)
          menuSound.currentTime = 0;
          menuSound.play().catch(() => {});
        });
      }
      
      // Close sidebar when clicking overlay
      if (overlay) {
        overlay.addEventListener('click', closeSidebar);
      }
      
      // Handle sidebar link clicks with sound and navigation
      if (sidebar) {
        const sidebarLinks = sidebar.querySelectorAll('a');
        sidebarLinks.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const destination = link.getAttribute('href');
            
            // Play sound
            navSound.currentTime = 0;
            navSound.play().catch(() => {});
            
            // Close sidebar
            closeSidebar();
            
            // Navigate after delay
            setTimeout(() => {
              window.location.href = destination;
            }, 150);
          });
        });
      }
      
      // Handle desktop nav links
      const desktopLinks = document.querySelectorAll('.nav-links a');
      desktopLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const destination = link.getAttribute('href');
          
          navSound.currentTime = 0;
          navSound.play().catch(() => {});
          
          setTimeout(() => {
            window.location.href = destination;
          }, 150);
        });
      });
      
      // Close sidebar on escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && sidebar && sidebar.classList.contains('active')) {
          closeSidebar();
        }
      });
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Contact | Black Widow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="./icon.png">
</head>
<body>

  <svg class="web-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(245,240,235,0.25)" fill="none" stroke-linecap="round">
      <line x1="400" y1="400" x2="400" y2="0" stroke-width="0.7"/><line x1="400" y1="400" x2="594" y2="14" stroke-width="0.6"/>
      <line x1="400" y1="400" x2="748" y2="110" stroke-width="0.7"/><line x1="400" y1="400" x2="800" y2="280" stroke-width="0.6"/>
      <line x1="400" y1="400" x2="800" y2="400" stroke-width="0.7"/>
    </g>
  </svg>

  <header>
    <nav class="navbar glass">
      <a href="community.html" class="btn-nav logo-btn">Black Widow Community</a>
      <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="projects.html">Projects</a></li><li><a href="contact.html" class="active">Contact</a></li></ul>
      <div class="hamburger" id="hamburger"><i class="fa fa-bars"></i></div>
    </nav>
    <div class="sidebar" id="sidebar"><ul><li><a href="index.html">Home</a></li><li><a href="projects.html">Projects</a></li><li><a href="contact.html" class="active">Contact</a></li></ul></div>
    <div class="overlay" id="overlay"></div>
  </header>

  <section class="contact-section">
    <div class="contact-container">
      <div class="contact-heading"><h1>Let's have a <br><span>Conversation</span></h1></div>
      <div class="contact-calendly"><div class="calendly-inline-widget" data-url="https://calendly.com/kagwe-bridgette/30min"></div><script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script></div>
    </div>
  </section>

  <footer class="footer glass-footer"><p>Based in <span>Melbourne, Australia</span></p></footer>

  <script src="https://unpkg.com/swiper@8/swiper-bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    const hamburger = document.getElementById('hamburger'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('overlay'), menuSound = new Audio('menu.mp3');
    hamburger.addEventListener('click', () => { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); menuSound.currentTime = 0; menuSound.play().catch(() => {}); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
    const navSound = new Audio('nav.mp3');
    document.querySelectorAll('.nav-links a, .sidebar a').forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); navSound.currentTime = 0; navSound.play().catch(() => {}); setTimeout(() => { window.location.href = link.getAttribute('href'); }, 150); }); });
  </script>
</body>
</html>
